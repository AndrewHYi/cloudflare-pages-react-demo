name: Cloudflare Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Non-production deploy target.
        required: true
        default: staging
        type: choice
        options:
          - staging
          - pr-preview
      branch_alias:
        description: Cloudflare Pages branch alias. Use int for staging or manual-pr-<number>-<name> for manual PR environments.
        required: false
        default: int
        type: string

permissions:
  contents: read

jobs:
  preview:
    name: Preview deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }}
      DEPLOY_BRANCH: pr-${{ github.event.pull_request.number }}
      DEPLOY_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      DEPLOY_ENVIRONMENT: preview
      VERIFY_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:path-route

      - name: Verify local proof
        run: |
          npm run test:proof
          npm run verify:path-routing

      - name: Check Cloudflare configuration
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_PAGES_PROJECT"

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          set -euo pipefail
          deploy_log="$(mktemp)"
          npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$DEPLOY_BRANCH" --commit-hash "$DEPLOY_COMMIT_SHA" | tee "$deploy_log"
          deployment_url="$(grep -Eo 'https://[^[:space:]]+\.pages\.dev[^[:space:]]*' "$deploy_log" | tail -n 1 || true)"
          if [ -z "$deployment_url" ]; then
            echo "Wrangler output did not include a Cloudflare Pages deployment URL." >&2
            exit 1
          fi
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Verify deployment proof
        run: npm run verify:deployment -- "${{ steps.deploy.outputs.url }}" "$VERIFY_SHA"

      - name: Write deploy summary
        run: |
          {
            echo "### Cloudflare Pages preview"
            echo
            echo "- URL: ${{ steps.deploy.outputs.url }}"
            echo "- SHA: $VERIFY_SHA"
          } >> "$GITHUB_STEP_SUMMARY"

  manual_nonproduction:
    name: Manual non-production deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: staging
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }}
      DEPLOY_BRANCH: ${{ inputs.branch_alias || 'int' }}
      DEPLOY_COMMIT_SHA: ${{ github.sha }}
      DEPLOY_ENVIRONMENT: ${{ inputs.target || 'staging' }}
      VERIFY_SHA: ${{ github.sha }}

    steps:
      - name: Validate branch alias
        run: |
          if [ -z "${DEPLOY_BRANCH}" ]; then
            echo "::error title=Missing branch_alias::Use int for staging or manual-pr-<number>-<name> for a manual PR environment."
            exit 1
          fi

          if [ "${DEPLOY_BRANCH}" = "main" ] || [ "${DEPLOY_BRANCH}" = "production" ]; then
            echo "::error title=Protected alias::Manual non-production deploys cannot use ${DEPLOY_BRANCH}."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:path-route

      - name: Verify local proof
        run: |
          npm run test:proof
          npm run verify:path-routing

      - name: Check Cloudflare configuration
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_PAGES_PROJECT"

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          set -euo pipefail
          deploy_log="$(mktemp)"
          npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$DEPLOY_BRANCH" --commit-hash "$DEPLOY_COMMIT_SHA" | tee "$deploy_log"
          deployment_url="$(grep -Eo 'https://[^[:space:]]+\.pages\.dev[^[:space:]]*' "$deploy_log" | tail -n 1 || true)"
          if [ -z "$deployment_url" ]; then
            echo "Wrangler output did not include a Cloudflare Pages deployment URL." >&2
            exit 1
          fi
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Verify deployment proof
        run: npm run verify:deployment -- "${{ steps.deploy.outputs.url }}" "$VERIFY_SHA"

      - name: Write deploy summary
        run: |
          {
            echo "### Cloudflare Pages manual non-production deploy"
            echo
            echo "- URL: ${{ steps.deploy.outputs.url }}"
            echo "- SHA: $VERIFY_SHA"
            echo "- Target: $DEPLOY_ENVIRONMENT"
            echo "- Branch alias: $DEPLOY_BRANCH"
          } >> "$GITHUB_STEP_SUMMARY"

  production:
    name: Production deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.CLOUDFLARE_PAGES_PROJECT != ''
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }}
      DEPLOY_BRANCH: main
      DEPLOY_COMMIT_SHA: ${{ github.sha }}
      DEPLOY_ENVIRONMENT: production
      VERIFY_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:path-route

      - name: Verify local proof
        run: |
          npm run test:proof
          npm run verify:path-routing

      - name: Check Cloudflare configuration
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_PAGES_PROJECT"

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          set -euo pipefail
          deploy_log="$(mktemp)"
          npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$DEPLOY_BRANCH" --commit-hash "$DEPLOY_COMMIT_SHA" | tee "$deploy_log"
          deployment_url="$(grep -Eo 'https://[^[:space:]]+\.pages\.dev[^[:space:]]*' "$deploy_log" | tail -n 1 || true)"
          if [ -z "$deployment_url" ]; then
            echo "Wrangler output did not include a Cloudflare Pages deployment URL." >&2
            exit 1
          fi
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Verify deployment proof
        run: npm run verify:deployment -- "${{ steps.deploy.outputs.url }}" "$VERIFY_SHA"

      - name: Write deploy summary
        run: |
          {
            echo "### Cloudflare Pages production"
            echo
            echo "- URL: ${{ steps.deploy.outputs.url }}"
            echo "- SHA: $VERIFY_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
