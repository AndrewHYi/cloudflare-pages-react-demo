name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  build:
    name: Build and proof
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify local proof
        run: npm run test:proof
