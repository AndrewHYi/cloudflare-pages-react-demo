name: Cloudflare account proof

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    name: Inspect Cloudflare account capabilities
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect Cloudflare account
        run: node scripts/cloudflare-account-proof.mjs
